<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GoRAG</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; height: 100vh; font-family: sans-serif; background: #f5f5f5; }

    #sidebar {
      width: 240px;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 8px;
    }
    #sidebar h2 { font-size: 14px; color: #89b4fa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .doc-item {
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .doc-item:hover { background: #313244; }
    .doc-item.active { background: #89b4fa; color: #1e1e2e; font-weight: bold; }

    #upload-btn {
      margin-top: auto;
      padding: 8px;
      background: #a6e3a1;
      color: #1e1e2e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    #file-input { display: none; }

    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #pdf-panel {
      flex: 1;
      border-right: 1px solid #ddd;
      background: #fff;
    }
    #pdf-frame { width: 100%; height: 100%; border: none; }

    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg { max-width: 90%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .msg.user { background: #89b4fa; color: #1e1e2e; align-self: flex-end; }
    .msg.bot { background: #f0f0f0; color: #1e1e2e; align-self: flex-start; }

    #chat-input-area {
      display: flex;
      padding: 12px;
      gap: 8px;
      border-top: 1px solid #eee;
    }
    #question {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    #send-btn {
      padding: 10px 16px;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    #send-btn:disabled { opacity: 0.5; cursor: default; }

    #no-doc {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <h2>Documents</h2>
  <div id="doc-list"></div>
  <input type="file" id="file-input" accept=".pdf">
  <button id="upload-btn" onclick="document.getElementById('file-input').click()">+ Upload PDF</button>
</div>

<div id="main">
  <div id="pdf-panel">
    <div id="no-doc">Select a document</div>
    <iframe id="pdf-frame" style="display:none"></iframe>
  </div>
  <div id="chat-panel">
    <div id="messages"></div>
    <div id="chat-input-area">
      <input id="question" type="text" placeholder="Ask a question..." disabled>
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>
</div>

<script>
  let currentSource = null

  async function loadDocuments() {
    const res = await fetch('/documents')
    const docs = await res.json()
    const list = document.getElementById('doc-list')
    list.innerHTML = ''
    docs.forEach(source => {
      const name = source.split('/').pop()
      const el = document.createElement('div')
      el.className = 'doc-item'
      el.textContent = name
      el.title = source
      el.onclick = () => selectDoc(source, el)
      list.appendChild(el)
    })
  }

  function selectDoc(source, el) {
    currentSource = source
    document.querySelectorAll('.doc-item').forEach(e => e.classList.remove('active'))
    el.classList.add('active')

    document.getElementById('no-doc').style.display = 'none'
    const frame = document.getElementById('pdf-frame')
    frame.style.display = 'block'
    frame.src = '/files/' + source.split('/').pop()

    document.getElementById('question').disabled = false
    document.getElementById('send-btn').disabled = false
    document.getElementById('messages').innerHTML = ''
  }

  document.getElementById('file-input').addEventListener('change', async (e) => {
    const file = e.target.files[0]
    if (!file) return
    const form = new FormData()
    form.append('file', file)
    await fetch('/upload', { method: 'POST', body: form })
    await loadDocuments()
    e.target.value = ''
  })

  document.getElementById('send-btn').addEventListener('click', sendQuestion)
  document.getElementById('question').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendQuestion()
  })

  async function sendQuestion() {
    const input = document.getElementById('question')
    const q = input.value.trim()
    if (!q || !currentSource) return

    input.value = ''
    document.getElementById('send-btn').disabled = true

    appendMessage(q, 'user')
    const botMsg = appendMessage('', 'bot')

    const res = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, source: currentSource })
    })

    const reader = res.body.getReader()
    const decoder = new TextDecoder()
    let buffer = ''

    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      buffer += decoder.decode(value, { stream: true })
      const lines = buffer.split('\n')
      buffer = lines.pop()
      for (const line of lines) {
        if (!line.trim()) continue
        try {
          const json = JSON.parse(line)
          botMsg.textContent += json.response
        } catch {}
      }
    }

    document.getElementById('send-btn').disabled = false
  }

  function appendMessage(text, role) {
    const msgs = document.getElementById('messages')
    const el = document.createElement('div')
    el.className = 'msg ' + role
    el.textContent = text
    msgs.appendChild(el)
    msgs.scrollTop = msgs.scrollHeight
    return el
  }

  loadDocuments()
</script>
</body>
</html>
